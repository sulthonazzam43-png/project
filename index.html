<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZamsDeploy Clone</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<!-- LOGIN CARD -->
<div class="card" id="loginCard">
<h2>Login Telegram</h2>

<input type="text" id="telegramId" placeholder="Masukkan Telegram ID">

<button onclick="login()">Login</button>

<div id="loginStatus"></div>
</div>


<!-- DASHBOARD -->
<div class="card hidden" id="dashboard">

<h2>Dashboard Deployer</h2>

<div class="tabs">
<button onclick="showTab('deploy')">Deploy</button>
<button onclick="showTab('encrypt')">Encrypt</button>
<button onclick="showTab('decrypt')">Decrypt</button>
</div>


<!-- DEPLOY -->
<div id="deploy" class="tab">
<h3>Deploy Website</h3>

<input type="file" id="deployFile" accept=".html">
<input type="text" id="domain" placeholder="Nama Domain (contoh: webkeren123)">
<button onclick="deploy()">Deploy ke Vercel</button>

<div id="deployStatus"></div>
</div>


<!-- ENCRYPT -->
<div id="encrypt" class="tab hidden">
<h3>Encrypt HTML</h3>

<input type="file" id="encryptFile" accept=".html">
<button onclick="encryptFile()">Encrypt</button>

<a id="downloadEncrypt" class="hidden">Download</a>
</div>


<!-- DECRYPT -->
<div id="decrypt" class="tab hidden">
<h3>Decrypt HTML</h3>

<input type="file" id="decryptFile">
<button onclick="decryptFile()">Decrypt</button>

<a id="downloadDecrypt" class="hidden">Download</a>
</div>


</div>
</div>

<script src="script.js"></script>
</body>
</html>
